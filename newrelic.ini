# =============================================================================
# New Relic Python agent configuration
# -----------------------------------------------------------------------------
# Docs: https://docs.newrelic.com/docs/apm/agents/python-agent/configuration/
#
# The license key is intentionally left blank here so this file is safe to
# commit. Provide it at runtime via the NEW_RELIC_LICENSE_KEY environment
# variable (see .env.example). Any setting in this file can be overridden by
# an environment variable named NEW_RELIC_<UPPERCASED_DOTTED_KEY>, e.g.
# distributed_tracing.enabled  ->  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
# =============================================================================

[newrelic]

# --- Identity ----------------------------------------------------------------

# Ingest license key is intentionally NOT defined here so the env var
# NEW_RELIC_LICENSE_KEY is used instead. Per New Relic docs, any value
# (including blank) set in this file overrides the environment variable, so
# the line must be omitted entirely — not just left empty.

# Display name for this service in the New Relic UI. Multiple processes
# reporting the same app_name are aggregated as one entity.
app_name = Tiny To-Do (Flask)

# When false, the agent loads but sends no data. Useful for disabling per env.
monitor_mode = true

# --- Agent logging (the agent's own diagnostic logs, NOT your app's logs) ----

log_level = info
log_file = stdout

# --- Tracing -----------------------------------------------------------------

# Distributed tracing links spans across services (e.g. browser -> Flask -> DB).
# Required for the connected trace view and for browser/APM correlation.
distributed_tracing.enabled = true

# Transaction tracer captures slow individual requests with full call detail.
transaction_tracer.enabled = true

# A transaction is considered "slow" if it exceeds the Apdex F threshold
# (4 x apdex_t, default 0.5s -> 2.0s). Lower this to capture more samples.
transaction_tracer.transaction_threshold = apdex_f

# Record SQL statements with literal values stripped out. Other options:
#   "raw"      - full SQL incl. values  (DO NOT use in production)
#   "off"      - no SQL captured
transaction_tracer.record_sql = obfuscated

# --- Errors ------------------------------------------------------------------

error_collector.enabled = true

# --- Browser monitoring (RUM) ------------------------------------------------

# When true, the agent's WSGI middleware injects the New Relic Browser JS
# snippet into the <head> of every text/html response. The snippet captures
# real user metrics (page load timing, AJAX calls, JS errors) and reports
# them to the linked Browser entity in New Relic, which is auto-created
# the first time data arrives.
#
# Default is true; declared explicitly here for clarity. Set to false to
# disable, or use newrelic.agent.get_browser_timing_header() in templates
# for manual placement.
browser_monitoring.auto_instrument = true

# --- Logs in Context ---------------------------------------------------------

# Forwards application log records (anything written via Python's `logging`
# module, including Flask's app.logger) to New Relic, automatically attaching
# the current trace/span IDs so each log line is linked to its APM transaction.
application_logging.enabled = true
application_logging.forwarding.enabled = true

# Emits Logs/sec metrics so log volume shows up on the APM summary chart.
application_logging.metrics.enabled = true

# Inserts trace.id and span.id into log records for any logs that aren't
# forwarded (e.g. ones still going to stdout). Lets external log shippers
# correlate too if you ever add one.
application_logging.local_decorating.enabled = true

# =============================================================================
# Per-environment overrides
# Activated by setting NEW_RELIC_ENVIRONMENT=development (or production).
# Anything not overridden here inherits from the [newrelic] section above.
# =============================================================================

[newrelic:development]
monitor_mode = true

[newrelic:production]
monitor_mode = true
