# =============================================================================
# New Relic Python agent configuration
# -----------------------------------------------------------------------------
# Docs: https://docs.newrelic.com/docs/apm/agents/python-agent/configuration/
#
# The license key is intentionally left blank here so this file is safe to
# commit. Provide it at runtime via the NEW_RELIC_LICENSE_KEY environment
# variable (see .env.example). Any setting in this file can be overridden by
# an environment variable named NEW_RELIC_<UPPERCASED_DOTTED_KEY>, e.g.
# distributed_tracing.enabled  ->  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED
# =============================================================================

[newrelic]

# --- Identity ----------------------------------------------------------------

# Ingest license key. Leave blank in source; set NEW_RELIC_LICENSE_KEY in env.
license_key =

# Display name for this service in the New Relic UI. Multiple processes
# reporting the same app_name are aggregated as one entity.
app_name = Tiny To-Do (Flask)

# When false, the agent loads but sends no data. Useful for disabling per env.
monitor_mode = true

# --- Agent logging (the agent's own diagnostic logs, NOT your app's logs) ----

log_level = info
log_file = stdout

# --- Tracing -----------------------------------------------------------------

# Distributed tracing links spans across services (e.g. browser -> Flask -> DB).
# Required for the connected trace view and for browser/APM correlation.
distributed_tracing.enabled = true

# Transaction tracer captures slow individual requests with full call detail.
transaction_tracer.enabled = true

# A transaction is considered "slow" if it exceeds the Apdex F threshold
# (4 x apdex_t, default 0.5s -> 2.0s). Lower this to capture more samples.
transaction_tracer.transaction_threshold = apdex_f

# Record SQL statements with literal values stripped out. Other options:
#   "raw"      - full SQL incl. values  (DO NOT use in production)
#   "off"      - no SQL captured
transaction_tracer.record_sql = obfuscated

# --- Errors ------------------------------------------------------------------

error_collector.enabled = true

# =============================================================================
# Per-environment overrides
# Activated by setting NEW_RELIC_ENVIRONMENT=development (or production).
# Anything not overridden here inherits from the [newrelic] section above.
# =============================================================================

[newrelic:development]
monitor_mode = true

[newrelic:production]
monitor_mode = true
